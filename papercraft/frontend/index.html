<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纸坊配浆抄纸实验记录系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="flex min-h-screen">
        <aside class="w-64 bg-slate-800 text-white flex-shrink-0">
            <div class="p-4 border-b border-slate-700">
                <h1 class="text-xl font-bold text-amber-400">📜 纸坊实验系统</h1>
            </div>
            <nav class="p-2">
                <a href="#/materials" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="materials">
                    🧪 材料管理
                </a>
                <a href="#/batches" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="batches">
                    📦 配浆批次管理
                </a>
                <a href="#/concentrations" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="concentrations">
                    🧫 槽液浓度记录
                </a>
                <a href="#/records" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="records">
                    📝 抄纸记录与成纸观察
                </a>
                <a href="#/compare" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="compare">
                    🔍 批次对比与回溯
                </a>
                <a href="#/statistics" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="statistics">
                    📊 材料占比统计
                </a>
                <a href="#/summary" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="summary">
                    📈 实验阶段总结
                </a>
                <a href="#/templates" class="nav-link block px-4 py-3 rounded-lg mb-1 hover:bg-slate-700 transition-colors" data-route="templates">
                    📋 实验方案模板
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
                <div class="flex items-center justify-between">
                    <h2 id="page-title" class="text-2xl font-semibold text-gray-800">欢迎使用</h2>
                    <div id="page-actions" class="flex gap-2"></div>
                </div>
            </header>
            <div id="page-content" class="p-6">
                <div class="text-center py-20">
                    <div class="text-6xl mb-4">📜</div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-4">纸坊配浆抄纸实验记录系统</h2>
                    <p class="text-gray-600 mb-8">请从左侧菜单选择功能模块开始使用</p>
                    <div class="grid grid-cols-4 gap-4 max-w-3xl mx-auto">
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                            <div class="text-4xl mb-2">🧪</div>
                            <div class="font-semibold">材料管理</div>
                            <div class="text-sm text-gray-500">纤维、胶料、填料</div>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                            <div class="text-4xl mb-2">📦</div>
                            <div class="font-semibold">配浆批次</div>
                            <div class="text-sm text-gray-500">配方管理与封存</div>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                            <div class="text-4xl mb-2">📝</div>
                            <div class="font-semibold">抄纸记录</div>
                            <div class="text-sm text-gray-500">成纸观察录入</div>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                            <div class="text-4xl mb-2">📋</div>
                            <div class="font-semibold">方案模板</div>
                            <div class="text-sm text-gray-500">版本管理与复刻</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-container"></div>
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/materials.js"></script>
    <script src="js/pages/batches.js"></script>
    <script src="js/pages/concentrations.js"></script>
    <script src="js/pages/records.js"></script>
    <script src="js/pages/compare.js"></script>
    <script src="js/pages/statistics.js"></script>
    <script src="js/pages/summary.js"></script>
    <script src="js/pages/templates.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
